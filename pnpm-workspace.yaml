# Security note (2026-06):
# The allowlists below exist to reduce supply-chain attack surface.
# - onlyBuiltDependencies / allowBuilds: only these packages are allowed to run
#   lifecycle scripts (postinstall, prepare, etc.) during `pnpm install`.
# - Any addition to this list MUST be reviewed for:
#     * Native code / node-gyp usage
#     * Obfuscated or remote-executing postinstall scripts
#     * Whether the package is truly required at install time
# See docs/plans/security-hardening-2026-06.md (P2) and SECURITY.md.

packages:
  - "packages/*"
  - "apps/*"
  - "website"
overrides:
  dompurify: ">=3.4.0"
allowBuilds:
  '@biomejs/biome': true
  better-sqlite3: true
  esbuild: true
onlyBuiltDependencies:
  - "@biomejs/biome"
  - better-sqlite3
  - esbuild