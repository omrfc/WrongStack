# Security note (2026-06):
# The allowlists below exist to reduce supply-chain attack surface.
# - onlyBuiltDependencies / allowBuilds: only these packages are allowed to run
#   lifecycle scripts (postinstall, prepare, etc.) during `pnpm install`.
# - Any addition to this list MUST be reviewed for:
#     * Native code / node-gyp usage
#     * Obfuscated or remote-executing postinstall scripts
#     * Whether the package is truly required at install time
# See docs/plans/security-hardening-2026-06.md (P2) and SECURITY.md.

packages:
  - "packages/*"
  - "apps/*"
  - "website"
overrides:
  # dompurify <=3.4.10: ALLOWED_ATTR pollution via setConfig (GHSA-cmwh-pvxp-8882).
  # Pulled in transitively by monaco-editor (webui). Patched in 3.4.11.
  dompurify: ">=3.4.11"
  esbuild: "^0.28.1"
  undici-types: "^8.4.0"
  # jsdom@29.1.1 (vitest test env) needs undici's 7.x line (it requires the
  # internal lib/handler/wrap-handler.js, absent from undici 8.x). Pin it to the
  # advisory-patched 7.28.0 — clears the undici GHSAs AND keeps jsdom working.
  # Scoped so non-jsdom undici consumers still float to the patched 8.x line.
  "jsdom>undici": "7.28.0"
# GHSA-gv7w-rqvm-qjhr: esbuild "missing binary integrity verification" applies
# only to esbuild's DENO installer path; we consume esbuild via tsup/vite/vitest
# (Node, devDependencies only). Remove once tsup/vite ship esbuild >= 0.28.1.
auditConfig:
  ignoreGhsas:
    - GHSA-gv7w-rqvm-qjhr
allowBuilds:
  '@biomejs/biome': true
  better-sqlite3: true
  esbuild: true
onlyBuiltDependencies:
  - "@biomejs/biome"
  - better-sqlite3
  - esbuild