name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR — no point testing stale code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (resolved 2026-05-29)
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all workspace packages in dependency (topological) order before
      # typechecking. Each package resolves its `@wrongstack/*` imports from a
      # dependency's *emitted* dist/*.d.ts, so without this step downstream
      # packages (e.g. @wrongstack/acp -> @wrongstack/core) fail with
      # TS2307 "Cannot find module '@wrongstack/core' or its corresponding
      # type declarations". `pnpm build` runs scripts/build.mjs, which topo-sorts.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
